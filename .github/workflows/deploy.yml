name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Build site
        run: node build.js

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Package Pages artifact
        run: |
          tar \
            --dereference \
            --hard-dereference \
            --directory . \
            --exclude=.git \
            --exclude=.github \
            --exclude='.[^/]*' \
            -cvf "$RUNNER_TEMP/github-pages.tar" \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: github-pages
          path: ${{ runner.temp }}/github-pages.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5